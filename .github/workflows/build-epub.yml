name: Build eBook

on:
  push:
    branches: [main]
    paths:
      - "*.md"
      - ".github/workflows/build-epub.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-latex-recommended texlive-latex-extra texlive-fonts-recommended lmodern

      - name: Create metadata
        run: |
          cat > title.txt << 'EOF'
          ---
          title: "AWS Service and Theme Index"
          author: "AWS Reference"
          lang: en
          geometry: margin=2.5cm
          fontsize: 11pt
          ---
          EOF

      - name: Build EPUB
        run: |
          pandoc \
            --toc \
            --toc-depth=2 \
            --epub-title-page=true \
            -o aws-reference.epub \
            title.txt \
            01-messaging.md \
            02-compute-storage.md \
            03-ai-ml.md \
            04-supporting.md \
            05-themes.md \
            06-questions.md

      - name: Build PDF
        run: |
          pandoc \
            --toc \
            --toc-depth=2 \
            --pdf-engine=pdflatex \
            -o aws-reference.pdf \
            title.txt \
            01-messaging.md \
            02-compute-storage.md \
            03-ai-ml.md \
            04-supporting.md \
            05-themes.md \
            06-questions.md

      - name: Upload EPUB
        uses: actions/upload-artifact@v4
        with:
          name: aws-reference-epub
          path: aws-reference.epub

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: aws-reference-pdf
          path: aws-reference.pdf

      - name: Generate release tag
        id: tag
        run: echo "tag=v$(date +'%Y%m%d-%H%M%S')" >> "$GITHUB_OUTPUT"

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" \
            --title "AWS Reference ${{ steps.tag.outputs.tag }}" \
            --notes "Auto-built EPUB and PDF from latest markdown sources." \
            aws-reference.epub \
            aws-reference.pdf
